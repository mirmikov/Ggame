services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-ggame}"
      POSTGRES_USER: "${POSTGRES_USER:-ggame}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ggame_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ggame} -d ${POSTGRES_DB:-ggame}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  prometheus-battle:
    build:
      context: .
      dockerfile: Dockerfile
    image: prometheus-battle:local
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-ggame}:${POSTGRES_PASSWORD:-ggame_password}@postgres:5432/${POSTGRES_DB:-ggame}?sslmode=disable"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - prometheus-battle
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      SITE_ADDRESS: "${SITE_ADDRESS:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
